name: Build MikaKernel
on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup environment
        run: |
          echo "ANYKERNEL_SOURCE=$(cat config.env | grep -w "ANYKERNEL_SOURCE" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
          echo "ANYKERNEL_SOURCE_BRANCH=$(cat config.env | grep -w "ANYKERNEL_SOURCE_BRANCH" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
          echo "KERNEL_SOURCE=$(cat config.env | grep -w "KERNEL_SOURCE" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
          echo "KERNEL_SOURCE_BRANCH=$(cat config.env | grep -w "KERNEL_SOURCE_BRANCH" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
          echo "KERNEL_TARGET=$(cat config.env | grep -w "KERNEL_TARGET" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
          echo "BUILD_ARGS=$(cat config.env | grep -w "BUILD_ARGS" | head -n 1 | cut -d ":" -f 2-)" >> $GITHUB_ENV

      - name: Pull toolchain
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 aarch64-linux-android-4.9
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 arm-linux-androideabi-4.9
          mkdir -p clang && cd clang
          curl -L https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android12-release/clang-r416183b1.tar.gz -o clang.tar.gz
          tar -xf clang.tar.gz
          cd ..

      - name: Pull kernel source
        run: |
          git clone --depth=1 ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_SOURCE_BRANCH }} kernel-source
          echo "KERNEL_VERSION=$(cat kernel-source/arch/arm64/configs/*.defconfig 2>/dev/null | grep "CONFIG_LOCALVERSION=" | head -n1 | sed -r 's/.*"(.+)".*/\1/' | sed 's/^.//')" >> $GITHUB_ENV

      - name: Integrate KernelSU v0.9.5
        run: |
          cd kernel-source
          echo "=== Äang tĆ­ch hį»£p KernelSU v0.9.5 cho kernel 4.9 ==="
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5
          echo "=== KernelSU ÄĆ£ ÄĘ°į»£c patch thĆ nh cĆ“ng ==="

      - name: List defconfigs (debug)
        run: |
          cd kernel-source
          echo "=== Danh sĆ”ch defconfig cĆ³ sįŗµn ==="
          ls -1 arch/arm64/configs/*defconfig || echo "KhĆ“ng tĆ¬m thįŗ„y defconfig nĆ o"
          echo "================================="

      - name: Build kernel
        run: |
          export KBUILD_BUILD_USER="vinhdroid04"
          export KBUILD_BUILD_HOST="github"
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          
          args="ARCH=arm64 O=../out ${{ env.BUILD_ARGS }} CLANG_TRIPLE=aarch64-linux-gnu- \
                CROSS_COMPILE=$GITHUB_WORKSPACE/aarch64-linux-android-4.9/bin/aarch64-linux-android- \
                CROSS_COMPILE_ARM32=$GITHUB_WORKSPACE/arm-linux-androideabi-4.9/bin/arm-linux-androideabi-"
          
          cd kernel-source
          
          echo "=== DANH SĆCH DEFCONFIG Mį»I ==="
          ls -1 arch/arm64/configs/ | grep -E "defconfig|config"
          echo "===================================="
          
          echo "=== Thį»­ defconfig cho sirius ==="
          
          if make ${args} sirius_defconfig; then
            echo "ā Sį»­ dį»„ng sirius_defconfig"
          elif make ${args} xmsirius_defconfig; then
            echo "ā Sį»­ dį»„ng xmsirius_defconfig"
          elif make ${args} defconfig; then
            echo "ā Sį»­ dį»„ng defconfig"
          else
            echo "ā Vįŗ«n khĆ“ng tĆ¬m thįŗ„y defconfig phĆ¹ hį»£p!"
            exit 1
          fi
          
          echo "=== BįŗÆt Äįŗ§u compile kernel (cĆ³ thį» mįŗ„t 15-30 phĆŗt) ==="
          make -j$(($(getconf _NPROCESSORS_ONLN) * 2)) ${args}

      - name: Package kernel
        run: |
          git clone --depth=1 ${{ env.ANYKERNEL_SOURCE }} -b ${{ env.ANYKERNEL_SOURCE_BRANCH }} AnyKernel3
          rm -rf AnyKernel3/.git AnyKernel3/.github AnyKernel3/LICENSE AnyKernel3/README.md
          cp -f kernel-source/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/ 2>/dev/null || \
          cp -f kernel-source/out/arch/arm64/boot/Image.gz AnyKernel3/ 2>/dev/null || \
          cp -f kernel-source/out/arch/arm64/boot/Image AnyKernel3/

      - name: Upload kernel to artifact
        uses: actions/upload-artifact@v4
        with:
          name: KernelSU_sirius_${{ env.KERNEL_VERSION }}
          path: AnyKernel3/*
          if-no-files-found: warn
